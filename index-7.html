<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>SILAI Boutique Manager</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f7f5f2; font-family: 'DM Sans', sans-serif; color: #1a1a1a; }
input, select { outline: none; }
button:hover { opacity: 0.88; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

<body>
<div id="root"></div>
<script type="text/babel">
const { createClient } = supabase;
const db = createClient("https://ywgiehrwkrzxgjkxygke.supabase.co","sb_publishable_w8qX5GOlxFkKdA11w05f_Q_ZHgqR7_1");
const STATUSES = ["Received","Cutting","Stitching","Finishing","Ready","Delivered"];
const SCOLOR = {Received:"#64748b",Cutting:"#d97706",Stitching:"#2563eb",Finishing:"#7c3aed",Ready:"#059669",Delivered:"#9ca3af"};
const SBG = {Received:"#f1f5f9",Cutting:"#fef3c7",Stitching:"#eff6ff",Finishing:"#f5f3ff",Ready:"#ecfdf5",Delivered:"#f9fafb"};
const iStyle = {width:"100%",background:"#fff",border:"1.5px solid #e2ddd6",borderRadius:10,padding:"10px 14px",color:"#1a1a1a",fontSize:14,fontFamily:"'DM Sans',sans-serif"};
const bPrimary = {background:"#2a2118",color:"#fff",border:"none",padding:"11px 20px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,width:"100%"};
const bGhost = {background:"#fff",color:"#2a2118",border:"1.5px solid #e2ddd6",padding:"7px 13px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:500};

function genCode(n){return n.trim().substring(0,3).toUpperCase().replace(/\s/g,"X")+"-"+Math.floor(1000+Math.random()*9000);}
function wa(phone,msg){window.open("https://wa.me/91"+phone+"?text="+encodeURIComponent(msg),"_blank");}

function Modal({title,onClose,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div className="fade-in" style={{background:"#fff",borderRadius:18,padding:28,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div style={{fontSize:17,fontWeight:700,color:"#1a1a1a",fontFamily:"'Playfair Display',serif"}}>{title}</div>
        <button onClick={onClose} style={{background:"#f5f3f0",border:"none",color:"#6b6b6b",cursor:"pointer",width:30,height:30,borderRadius:"50%",fontSize:14}}>X</button>
      </div>
      {children}
    </div>
  </div>;
}

function Badge({label,color,bg}){
  return <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:bg||"#f5f3f0",color:color||"#6b6b6b",fontWeight:600}}>{label}</span>;
}

function Logo(){
  return <div style={{textAlign:"center",marginBottom:32}}>
    <div style={{width:52,height:52,background:"#2a2118",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"#fff",fontWeight:700,margin:"0 auto 12px",fontFamily:"'Playfair Display',serif"}}>S</div>
    <div style={{fontSize:24,fontWeight:700,letterSpacing:2,color:"#2a2118",fontFamily:"'Playfair Display',serif"}}>SILAI</div>
    <div style={{fontSize:10,color:"#b0a090",letterSpacing:3,fontWeight:500}}>BOUTIQUE MANAGER</div>
  </div>;
}

function Card({children}){
  return <div style={{minHeight:"100vh",background:"#f7f5f2",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div className="fade-in" style={{background:"#fff",borderRadius:20,padding:36,width:"100%",maxWidth:400,boxShadow:"0 8px 40px rgba(0,0,0,0.08)"}}>
      <Logo/>{children}
    </div>
  </div>;
}

// Detect if URL contains a Supabase token
function getUrlType(){
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace("#","?").replace("#","&"));
  const type = params.get("type");
  const token = params.get("access_token");
  if((type==="recovery"||type==="invite"||type==="signup")&&token) return {type, token};
  return null;
}

function SetPasswordScreen({onDone}){
  const [pw,setPw]=React.useState("");
  const [pw2,setPw2]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState("");
  const [ok,setOk]=React.useState("");

  const save=async()=>{
    if(!pw||!pw2){setErr("Please fill both fields");return;}
    if(pw!==pw2){setErr("Passwords do not match");return;}
    if(pw.length<6){setErr("Password must be at least 6 characters");return;}
    setLoading(true);setErr("");
    const {error}=await db.auth.updateUser({password:pw});
    setLoading(false);
    if(error){setErr(error.message);return;}
    setOk("Password set! Taking you to the app...");
    // Clear hash from URL
    window.history.replaceState(null,"",window.location.pathname);
    setTimeout(()=>onDone(),1500);
  };

  return <Card>
    <div style={{fontSize:18,fontWeight:600,color:"#1a1a1a",marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Set your password</div>
    <div style={{fontSize:13,color:"#9b8b77",marginBottom:24}}>Choose a secure password for your account</div>
    {err&&<div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#dc2626",marginBottom:16}}>{err}</div>}
    {ok&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#059669",marginBottom:16}}>{ok}</div>}
    <div style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>New Password</label><input type="password" placeholder="minimum 6 characters" value={pw} onChange={e=>setPw(e.target.value)} style={iStyle}/></div>
    <div style={{marginBottom:20}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>Confirm Password</label><input type="password" placeholder="repeat your password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} style={iStyle}/></div>
    <button onClick={save} disabled={loading} style={bPrimary}>{loading?"Saving...":"Set Password & Enter App"}</button>
  </Card>;
}

function AuthScreen({onAuth}){
  const [mode,setMode]=React.useState("login");
  const [f,setF]=React.useState({email:"",password:""});
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState("");
  const [ok,setOk]=React.useState("");

  const login=async()=>{
    if(!f.email||!f.password){setErr("Please fill all fields");return;}
    setLoading(true);setErr("");
    const {data,error}=await db.auth.signInWithPassword({email:f.email,password:f.password});
    setLoading(false);
    if(error){setErr(error.message);return;}
    onAuth(data.user);
  };

  const forgot=async()=>{
    if(!f.email){setErr("Enter your email first");return;}
    setLoading(true);setErr("");
    await db.auth.resetPasswordForEmail(f.email,{redirectTo:"https://silai-app-alpha.vercel.app/"});
    setLoading(false);
    setOk("Reset email sent! Check your inbox.");
  };

  return <Card>
    <div style={{fontSize:18,fontWeight:600,color:"#1a1a1a",marginBottom:6,fontFamily:"'Playfair Display',serif"}}>{mode==="login"?"Welcome back":"Reset Password"}</div>
    <div style={{fontSize:13,color:"#9b8b77",marginBottom:24}}>{mode==="login"?"Sign in to manage your boutique":"We will send you a reset link"}</div>
    {err&&<div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#dc2626",marginBottom:16}}>{err}</div>}
    {ok&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#059669",marginBottom:16}}>{ok}</div>}
    <div style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>Email</label><input type="email" placeholder="you@example.com" value={f.email} onChange={e=>setF({...f,email:e.target.value})} style={iStyle}/></div>
    {mode==="login"&&<div style={{marginBottom:20}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>Password</label><input type="password" placeholder="your password" value={f.password} onChange={e=>setF({...f,password:e.target.value})} onKeyDown={e=>e.key==="Enter"&&login()} style={iStyle}/></div>}
    {mode==="login"&&<><button onClick={login} disabled={loading} style={bPrimary}>{loading?"Signing in...":"Sign In"}</button><div style={{textAlign:"center",marginTop:16,fontSize:13,color:"#9b8b77"}}><span style={{cursor:"pointer",color:"#2a2118",fontWeight:500}} onClick={()=>{setMode("forgot");setErr("");setOk("");}}>Forgot password?</span></div><div style={{textAlign:"center",marginTop:12,fontSize:12,color:"#b0a090"}}>Access is by invitation only</div></>}
    {mode==="forgot"&&<><button onClick={forgot} disabled={loading} style={bPrimary}>{loading?"Sending...":"Send Reset Email"}</button><div style={{textAlign:"center",marginTop:16,fontSize:13}}><span style={{cursor:"pointer",color:"#2a2118",fontWeight:600}} onClick={()=>{setMode("login");setErr("");setOk("");}}>Back to login</span></div></>}
  </Card>;
}

function App(){
  const [user,setUser]=React.useState(null);
  const [checked,setChecked]=React.useState(false);
  const [screen,setScreen]=React.useState("loading"); // loading | setpassword | auth | app
  const [tab,setTab]=React.useState("dashboard");
  const [customers,setCustomers]=React.useState([]);
  const [orders,setOrders]=React.useState([]);
  const [inventory,setInventory]=React.useState([]);
  const [dataLoading,setDataLoading]=React.useState(false);
  const [toast,setToast]=React.useState(null);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  React.useEffect(()=>{
    // First check if this is a recovery/invite link
    const urlType = getUrlType();
    
    db.auth.getSession().then(({data:{session}})=>{
      if(urlType && session){
        // User clicked invite/recovery link and is now logged in — show password screen
        setUser(session.user);
        setScreen("setpassword");
      } else if(session){
        setUser(session.user);
        setScreen("app");
      } else {
        setScreen("auth");
      }
      setChecked(true);
    });

    const {data:{subscription}}=db.auth.onAuthStateChange((event,session)=>{
      if(event==="PASSWORD_RECOVERY"){
        setUser(session?.user||null);
        setScreen("setpassword");
      } else if(event==="SIGNED_IN"&&screen!=="setpassword"){
        setUser(session?.user||null);
        if(screen!=="setpassword") setScreen("app");
      } else if(event==="SIGNED_OUT"){
        setUser(null);
        setScreen("auth");
      }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const fetchAll=React.useCallback(async(u)=>{
    const uid=(u||user)?.id;
    if(!uid)return;
    setDataLoading(true);
    const [c,o,inv]=await Promise.all([
      db.from("customers").select("*").eq("boutique_id",uid).order("created_at",{ascending:false}),
      db.from("orders").select("*").eq("boutique_id",uid).order("created_at",{ascending:false}),
      db.from("inventory").select("*").eq("boutique_id",uid).order("created_at",{ascending:true}),
    ]);
    if(c.data)setCustomers(c.data);
    if(o.data)setOrders(o.data);
    if(inv.data)setInventory(inv.data);
    setDataLoading(false);
  },[user]);

  React.useEffect(()=>{if(screen==="app"&&user)fetchAll();},[screen,user]);

  const signOut=async()=>{await db.auth.signOut();setUser(null);setCustomers([]);setOrders([]);setInventory([]);setScreen("auth");};

  if(!checked||screen==="loading") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f7f5f2"}}><div style={{fontSize:13,color:"#9b8b77",letterSpacing:4}}>LOADING...</div></div>;
  if(screen==="setpassword") return <SetPasswordScreen onDone={()=>{setScreen("app");fetchAll(user);}}/>;
  if(screen==="auth") return <AuthScreen onAuth={u=>{setUser(u);setScreen("app");}}/>;
  if(dataLoading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f7f5f2"}}><div style={{fontSize:13,color:"#9b8b77",letterSpacing:4}}>LOADING SILAI...</div></div>;

  const pending=orders.filter(o=>o.status!=="Delivered").length;
  const ready=orders.filter(o=>o.status==="Ready").length;
  const unpaidAmt=orders.filter(o=>!o.paid).reduce((s,o)=>s+Number(o.amount),0);
  const lowStock=inventory.filter(i=>i.qty<=i.threshold).length;
  const bname=user?.user_metadata?.boutique_name||user?.email||"Boutique";

  return <div style={{minHeight:"100vh",background:"#f7f5f2"}}>
    {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.type==="error"?"#fef2f2":"#f0fdf4",color:toast.type==="error"?"#dc2626":"#16a34a",padding:"12px 20px",borderRadius:12,fontSize:13,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,0.1)",border:"1px solid "+(toast.type==="error"?"#fecaca":"#bbf7d0")}}>{toast.msg}</div>}
    <div style={{background:"#fff",borderBottom:"1px solid #ede8e0",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 1px 8px rgba(0,0,0,0.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:36,height:36,background:"#2a2118",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontFamily:"'Playfair Display',serif",fontSize:16}}>S</div>
        <div><div style={{fontSize:17,fontWeight:700,letterSpacing:2,color:"#2a2118",fontFamily:"'Playfair Display',serif"}}>SILAI</div><div style={{fontSize:9,color:"#b0a090",letterSpacing:2,fontWeight:500}}>BOUTIQUE MANAGER</div></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{fontSize:12,textAlign:"right"}}><div style={{color:"#2a2118",fontWeight:600}}>{bname}</div><div style={{color:"#9b8b77",fontSize:11}}>{new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</div></div>
        <button onClick={signOut} style={{background:"#f7f5f2",border:"1.5px solid #ede8e0",color:"#6b6b6b",padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>Sign Out</button>
      </div>
    </div>
    <div style={{display:"flex",borderBottom:"1px solid #ede8e0",background:"#fff",overflowX:"auto"}}>
      {[["dashboard","Dashboard"],["customers","Customers"],["orders","Orders"],["billing","Billing"],["inventory","Inventory"]].map(([id,label])=>
        <button key={id} onClick={()=>setTab(id)} style={{padding:"12px 20px",border:"none",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",background:"transparent",color:tab===id?"#2a2118":"#9b8b77",borderBottom:tab===id?"2.5px solid #2a2118":"2.5px solid transparent",fontWeight:tab===id?600:400}}>{label}</button>
      )}
    </div>
    <div style={{padding:"22px 24px",maxWidth:1100,margin:"0 auto"}}>
      {tab==="dashboard"&&<Dashboard orders={orders} customers={customers} pending={pending} ready={ready} unpaidAmt={unpaidAmt} lowStock={lowStock} user={user}/>}
      {tab==="customers"&&<Customers customers={customers} orders={orders} db={db} user={user} onRefresh={fetchAll} showToast={showToast}/>}
      {tab==="orders"&&<Orders orders={orders} customers={customers} db={db} user={user} onRefresh={fetchAll} showToast={showToast}/>}
      {tab==="billing"&&<Billing orders={orders} customers={customers} db={db} onRefresh={fetchAll} showToast={showToast}/>}
      {tab==="inventory"&&<Inventory inventory={inventory} db={db} user={user} onRefresh={fetchAll} showToast={showToast}/>}
    </div>
  </div>;
}

function Dashboard({orders,customers,pending,ready,unpaidAmt,lowStock,user}){
  const isNew = !orders.length && !customers.length;
  return <div className="fade-in">
    <div style={{fontSize:22,marginBottom:20,color:"#2a2118",fontFamily:"'Playfair Display',serif"}}>Good day</div>
    {isNew && <div style={{background:"#fffbeb",border:"1.5px solid #fcd34d",borderRadius:12,padding:"14px 18px",marginBottom:20,fontSize:13,color:"#92400e",lineHeight:1.6}}>
      <strong>Welcome to SILAI!</strong> To set your password, click <strong>Sign Out</strong> above, then use <strong>Forgot password?</strong> on the login screen. You will receive an email to set your password securely.
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14,marginBottom:24}}>
      {[{l:"Customers",v:customers.length,c:"#2a2118",b:"#f7f5f2"},{l:"Pending Orders",v:pending,c:"#d97706",b:"#fffbeb"},{l:"Ready for Pickup",v:ready,c:"#059669",b:"#f0fdf4"},{l:"Unpaid",v:"Rs."+unpaidAmt.toLocaleString(),c:"#dc2626",b:"#fff5f5"},{l:"Low Stock",v:lowStock,c:lowStock>0?"#dc2626":"#059669",b:lowStock>0?"#fff5f5":"#f0fdf4"}].map(s=>
        <div key={s.l} style={{background:s.b,border:"1.5px solid #ede8e0",borderRadius:14,padding:"16px 18px"}}>
          <div style={{fontSize:24,fontWeight:700,color:s.c,fontFamily:"'Playfair Display',serif"}}>{s.v}</div>
          <div style={{fontSize:11,color:"#9b8b77",marginTop:2,fontWeight:500}}>{s.l}</div>
        </div>
      )}
    </div>
    <div style={{background:"#fff",border:"1.5px solid #ede8e0",borderRadius:14,padding:18}}>
      <div style={{fontSize:13,color:"#2a2118",marginBottom:14,fontWeight:600}}>Recent Orders</div>
      {orders.slice(0,6).map(o=><div key={o.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f5f3f0"}}>
        <div><span style={{color:"#1a1a1a",fontSize:14,fontWeight:500}}>{o.customer_name}</span><span style={{color:"#9b8b77",fontSize:12,marginLeft:8}}>{o.item}</span></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge label={o.status} color={SCOLOR[o.status]} bg={SBG[o.status]}/><span style={{color:"#2a2118",fontSize:13,fontWeight:600}}>Rs.{o.amount}</span></div>
      </div>)}
      {orders.length===0&&<div style={{color:"#9b8b77",fontSize:13,textAlign:"center",padding:16}}>No orders yet.</div>}
    </div>
  </div>;
}

function Customers({customers,orders,db,user,onRefresh,showToast}){
  const [search,setSearch]=React.useState("");
  const [showNew,setShowNew]=React.useState(false);
  const [viewC,setViewC]=React.useState(null);
  const [editM,setEditM]=React.useState(null);
  const [f,setF]=React.useState({name:"",phone:"",notes:""});
  const [mf,setMf]=React.useState({chest:"",waist:"",hip:"",shoulder:"",length:"",sleeve:"",inseam:""});
  const [saving,setSaving]=React.useState(false);
  const filtered=customers.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.code.toLowerCase().includes(search.toLowerCase())||c.phone.includes(search));
  const add=async()=>{if(!f.name.trim()||!f.phone.trim()){showToast("Name and phone required","error");return;}setSaving(true);await db.from("customers").insert({boutique_id:user.id,code:genCode(f.name),name:f.name,phone:f.phone,notes:f.notes,measurements:{}});setSaving(false);showToast("Customer added");setF({name:"",phone:"",notes:""});setShowNew(false);onRefresh();};
  const openM=c=>{const m=c.measurements||{};setMf({chest:m.chest||"",waist:m.waist||"",hip:m.hip||"",shoulder:m.shoulder||"",length:m.length||"",sleeve:m.sleeve||"",inseam:m.inseam||""});setEditM(c);};
  const saveM=async()=>{setSaving(true);await db.from("customers").update({measurements:mf,measurement_date:new Date().toISOString().split("T")[0]}).eq("id",editM.id);setSaving(false);showToast("Measurements saved");setEditM(null);onRefresh();};
  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div style={{fontSize:20,color:"#2a2118",fontFamily:"'Playfair Display',serif"}}>Customer Profiles</div>
      <button onClick={()=>setShowNew(true)} style={{...bPrimary,width:"auto",padding:"9px 18px"}}>+ New Customer</button>
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, code or phone" style={{...iStyle,marginBottom:16}}/>
    <div style={{display:"grid",gap:10}}>
      {filtered.map(c=>{const hasM=c.measurements&&Object.keys(c.measurements).length>0;return <div key={c.id} style={{background:"#fff",border:"1.5px solid #ede8e0",borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:42,height:42,background:"#f7f5f2",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#2a2118",border:"1.5px solid #ede8e0",flexShrink:0}}>{c.name[0].toUpperCase()}</div>
          <div><div style={{fontWeight:600,fontSize:14}}>{c.name}</div><div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",alignItems:"center"}}><span style={{fontSize:11,background:"#2a2118",color:"#fff",padding:"2px 9px",borderRadius:10,fontWeight:600}}>{c.code}</span><span style={{fontSize:12,color:"#9b8b77"}}>{c.phone}</span>{hasM&&<span style={{fontSize:11,color:"#059669",fontWeight:500}}>Measured</span>}</div></div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          <button onClick={()=>setViewC(c)} style={bGhost}>View</button>
          <button onClick={()=>openM(c)} style={{...bGhost,background:hasM?"#f0fdf4":"#fff5f5",borderColor:hasM?"#bbf7d0":"#fecaca",color:hasM?"#059669":"#dc2626"}}>{hasM?"Update M.":"Add M."}</button>
        </div>
      </div>;})}
      {filtered.length===0&&<div style={{color:"#9b8b77",textAlign:"center",padding:40,background:"#fff",borderRadius:14,border:"1.5px solid #ede8e0"}}>No customers yet.</div>}
    </div>
    {showNew&&<Modal title="New Customer" onClose={()=>setShowNew(false)}>
      {[["Full Name","name","text"],["Phone Number","phone","tel"],["Notes (optional)","notes","text"]].map(([l,k,t])=><div key={k} style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input type={t} value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})} style={iStyle}/></div>)}
      <button onClick={add} disabled={saving} style={{...bPrimary,marginTop:4}}>{saving?"Saving...":"Create Customer and Generate Code"}</button>
    </Modal>}
    {editM&&<Modal title={"Measurements - "+editM.name} onClose={()=>setEditM(null)}>
      <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#059669",fontWeight:500}}>Code: <strong>{editM.code}</strong>{editM.measurement_date&&<span style={{marginLeft:12,color:"#9b8b77"}}>Last: {editM.measurement_date}</span>}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[["Chest","chest"],["Waist","waist"],["Hip","hip"],["Shoulder","shoulder"],["Length","length"],["Sleeve","sleeve"],["Inseam","inseam"]].map(([l,k])=><div key={k}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:4,fontWeight:500}}>{l} (in)</label><input type="number" value={mf[k]} onChange={e=>setMf({...mf,[k]:e.target.value})} style={iStyle}/></div>)}
      </div>
      <button onClick={saveM} disabled={saving} style={{...bPrimary,marginTop:16}}>{saving?"Saving...":"Save Measurements"}</button>
    </Modal>}
    {viewC&&<Modal title={viewC.name} onClose={()=>setViewC(null)}>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}><span style={{fontSize:12,background:"#2a2118",color:"#fff",padding:"3px 10px",borderRadius:10,fontWeight:600}}>{viewC.code}</span><span style={{fontSize:12,color:"#9b8b77"}}>{viewC.phone}</span></div>
      {viewC.notes&&<div style={{fontSize:13,color:"#6b6b6b",marginBottom:14,background:"#f7f5f2",padding:"8px 12px",borderRadius:8}}>{viewC.notes}</div>}
      {viewC.measurements&&Object.keys(viewC.measurements).length>0&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:14,marginBottom:14}}>
        <div style={{fontSize:12,color:"#059669",marginBottom:10,fontWeight:600}}>Measurements - {viewC.measurement_date}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {Object.entries(viewC.measurements).filter(([,v])=>v).map(([k,v])=><div key={k} style={{textAlign:"center",background:"#fff",borderRadius:8,padding:"8px 4px"}}><div style={{fontSize:16,color:"#2a2118",fontWeight:700}}>{v}"</div><div style={{fontSize:10,color:"#9b8b77",textTransform:"capitalize",marginTop:2}}>{k}</div></div>)}
        </div>
      </div>}
      <div style={{fontSize:13,color:"#2a2118",marginBottom:10,fontWeight:600}}>Order History</div>
      {orders.filter(o=>o.customer_id===viewC.id).map(o=><div key={o.id} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #f5f3f0",fontSize:13,alignItems:"center"}}><span style={{fontWeight:500}}>{o.item}</span><Badge label={o.status} color={SCOLOR[o.status]} bg={SBG[o.status]}/><span style={{color:"#2a2118",fontWeight:600}}>Rs.{o.amount}</span></div>)}
      {orders.filter(o=>o.customer_id===viewC.id).length===0&&<div style={{color:"#9b8b77",fontSize:13}}>No orders yet.</div>}
    </Modal>}
  </div>;
}

function Orders({orders,customers,db,user,onRefresh,showToast}){
  const [filter,setFilter]=React.useState("All");
  const [showNew,setShowNew]=React.useState(false);
  const [f,setF]=React.useState({customer_id:"",item:"",fabric:"",due_date:"",amount:""});
  const [saving,setSaving]=React.useState(false);
  const filtered=filter==="All"?orders:orders.filter(o=>o.status===filter);
  const add=async()=>{const c=customers.find(x=>x.id===f.customer_id);if(!c||!f.item||!f.amount){showToast("Fill all required fields","error");return;}setSaving(true);await db.from("orders").insert({boutique_id:user.id,customer_id:c.id,customer_name:c.name,customer_code:c.code,item:f.item,fabric:f.fabric,status:"Received",due_date:f.due_date||null,amount:parseFloat(f.amount),paid:false});setSaving(false);showToast("Order created");setF({customer_id:"",item:"",fabric:"",due_date:"",amount:""});setShowNew(false);onRefresh();};
  const updateStatus=async(id,status)=>{await db.from("orders").update({status}).eq("id",id);onRefresh();if(status==="Ready")showToast("Order ready! Notify the customer");};
  const notify=order=>{const c=customers.find(x=>x.id===order.customer_id);if(!c)return;const msgs={Received:"Hi "+order.customer_name+"\nWe received your order for "+order.item+".\nDue: "+(order.due_date||"TBD")+"\nRef: "+order.customer_code,Ready:"Hi "+order.customer_name+"\nYour "+order.item+" is ready!\nAmount: Rs."+order.amount+(order.paid?"":" (payment pending)")+"\nRef: "+order.customer_code,Delivered:"Thank you "+order.customer_name+"! Hope you love your "+order.item+"!"};wa(c.phone,msgs[order.status]||msgs.Received);showToast("WhatsApp opened!");};
  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div style={{fontSize:20,color:"#2a2118",fontFamily:"'Playfair Display',serif"}}>Orders</div>
      <button onClick={()=>setShowNew(true)} style={{...bPrimary,width:"auto",padding:"9px 18px"}}>+ New Order</button>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {["All",...STATUSES].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",fontWeight:500,background:filter===s?(SBG[s]||"#f7f5f2"):"#fff",color:filter===s?(SCOLOR[s]||"#2a2118"):(SCOLOR[s]||"#6b6b6b"),borderColor:SCOLOR[s]||"#ede8e0"}}>{s}</button>)}
    </div>
    <div style={{display:"grid",gap:10}}>
      {filtered.map(o=><div key={o.id} style={{background:"#fff",border:"1.5px solid #ede8e0",borderRadius:14,padding:"14px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{o.customer_name} <span style={{fontSize:11,color:"#9b8b77",fontWeight:400}}>#{o.customer_code}</span></div><div style={{fontSize:12,color:"#9b8b77",marginTop:3}}>{o.item}{o.fabric&&" - "+o.fabric}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:"#2a2118",fontWeight:700,fontSize:15}}>Rs.{o.amount}</div><div style={{fontSize:11,color:o.paid?"#059669":"#dc2626",fontWeight:500,marginTop:2}}>{o.paid?"Paid":"Unpaid"}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{STATUSES.map(s=><button key={s} onClick={()=>updateStatus(o.id,s)} style={{padding:"4px 10px",borderRadius:8,border:"1.5px solid",cursor:"pointer",fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:500,background:o.status===s?SBG[s]:"#fff",color:SCOLOR[s],borderColor:o.status===s?SCOLOR[s]:"#ede8e0"}}>{s}</button>)}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>{o.due_date&&<span style={{fontSize:11,color:"#9b8b77"}}>Due: {o.due_date}</span>}<button onClick={()=>notify(o)} style={{background:"#25D366",border:"none",color:"#fff",padding:"5px 12px",borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>WA Notify</button></div>
        </div>
      </div>)}
      {filtered.length===0&&<div style={{color:"#9b8b77",textAlign:"center",padding:40,background:"#fff",borderRadius:14,border:"1.5px solid #ede8e0"}}>No orders.</div>}
    </div>
    {showNew&&<Modal title="New Order" onClose={()=>setShowNew(false)}>
      <div style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>Customer *</label><select value={f.customer_id} onChange={e=>setF({...f,customer_id:e.target.value})} style={iStyle}><option value="">Select customer...</option>{customers.map(c=><option key={c.id} value={c.id}>{c.name} ({c.code})</option>)}</select></div>
      {f.customer_id&&(()=>{const c=customers.find(x=>x.id===f.customer_id);const hasM=c?.measurements&&Object.keys(c.measurements).length>0;return hasM?<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:"#059669",fontWeight:500}}>Chest {c.measurements.chest}", Waist {c.measurements.waist}", Hip {c.measurements.hip}"</div>:<div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:"#dc2626",fontWeight:500}}>No measurements on file</div>;})()}
      {[["Item *","item","text"],["Fabric","fabric","text"],["Due Date","due_date","date"],["Amount Rs. *","amount","number"]].map(([l,k,t])=><div key={k} style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input type={t} value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})} style={iStyle}/></div>)}
      <button onClick={add} disabled={saving} style={bPrimary}>{saving?"Saving...":"Create Order"}</button>
    </Modal>}
  </div>;
}

function Billing({orders,customers,db,onRefresh,showToast}){
  const unpaid=orders.filter(o=>!o.paid);
  const paid=orders.filter(o=>o.paid);
  const markPaid=async id=>{await db.from("orders").update({paid:true}).eq("id",id);showToast("Marked as paid");onRefresh();};
  const receipt=order=>{const c=customers.find(x=>x.id===order.customer_id);if(!c)return;wa(c.phone,"Payment Receipt\n\nCustomer: "+order.customer_name+"\nCode: "+order.customer_code+"\nItem: "+order.item+"\nAmount: Rs."+order.amount+"\nDate: "+new Date().toLocaleDateString("en-IN")+"\n\nThank you!");showToast("Receipt sent!");};
  return <div className="fade-in">
    <div style={{fontSize:20,color:"#2a2118",marginBottom:18,fontFamily:"'Playfair Display',serif"}}>Billing and Payments</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:22}}>
      <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:14,padding:18}}><div style={{fontSize:11,color:"#059669",marginBottom:4,letterSpacing:2,fontWeight:600}}>COLLECTED</div><div style={{fontSize:26,fontWeight:700,color:"#059669",fontFamily:"'Playfair Display',serif"}}>Rs.{paid.reduce((s,o)=>s+Number(o.amount),0).toLocaleString()}</div></div>
      <div style={{background:"#fff5f5",border:"1.5px solid #fecaca",borderRadius:14,padding:18}}><div style={{fontSize:11,color:"#dc2626",marginBottom:4,letterSpacing:2,fontWeight:600}}>PENDING</div><div style={{fontSize:26,fontWeight:700,color:"#dc2626",fontFamily:"'Playfair Display',serif"}}>Rs.{unpaid.reduce((s,o)=>s+Number(o.amount),0).toLocaleString()}</div></div>
    </div>
    <div style={{fontSize:13,color:"#2a2118",marginBottom:10,fontWeight:600}}>Pending ({unpaid.length})</div>
    <div style={{display:"grid",gap:8,marginBottom:22}}>
      {unpaid.map(o=><div key={o.id} style={{background:"#fff5f5",border:"1.5px solid #fecaca",borderRadius:12,padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <div><div style={{fontWeight:600,fontSize:14}}>{o.customer_name} <span style={{fontSize:11,color:"#9b8b77",fontWeight:400}}>#{o.customer_code}</span></div><div style={{fontSize:12,color:"#9b8b77"}}>{o.item}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}><span style={{color:"#dc2626",fontWeight:700}}>Rs.{o.amount}</span><button onClick={()=>markPaid(o.id)} style={{background:"#059669",border:"none",color:"#fff",padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Paid</button></div>
      </div>)}
      {unpaid.length===0&&<div style={{color:"#059669",textAlign:"center",padding:20,background:"#f0fdf4",borderRadius:12,border:"1px solid #bbf7d0",fontWeight:500}}>All payments collected!</div>}
    </div>
    <div style={{fontSize:13,color:"#9b8b77",marginBottom:10,fontWeight:500}}>Paid Orders</div>
    <div style={{display:"grid",gap:8}}>
      {paid.map(o=><div key={o.id} style={{background:"#fff",border:"1.5px solid #ede8e0",borderRadius:12,padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <div><div style={{fontSize:13,fontWeight:500}}>{o.customer_name} <span style={{fontSize:11,color:"#9b8b77",fontWeight:400}}>#{o.customer_code}</span></div><div style={{fontSize:12,color:"#9b8b77"}}>{o.item}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}><span style={{color:"#059669",fontWeight:700}}>Rs.{o.amount}</span><button onClick={()=>receipt(o)} style={{background:"#25D366",border:"none",color:"#fff",padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Receipt</button></div>
      </div>)}
    </div>
  </div>;
}

function Inventory({inventory,db,user,onRefresh,showToast}){
  const [showNew,setShowNew]=React.useState(false);
  const [f,setF]=React.useState({name:"",qty:"",unit:"metres",threshold:""});
  const [saving,setSaving]=React.useState(false);
  const add=async()=>{if(!f.name||!f.qty){showToast("Name and quantity required","error");return;}setSaving(true);await db.from("inventory").insert({boutique_id:user.id,name:f.name,qty:parseFloat(f.qty),unit:f.unit,threshold:parseFloat(f.threshold)||5});setSaving(false);showToast("Item added");setF({name:"",qty:"",unit:"metres",threshold:""});setShowNew(false);onRefresh();};
  const updateQty=async(id,delta,cur)=>{await db.from("inventory").update({qty:Math.max(0,cur+delta)}).eq("id",id);onRefresh();};
  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div style={{fontSize:20,color:"#2a2118",fontFamily:"'Playfair Display',serif"}}>Fabric and Inventory</div>
      <button onClick={()=>setShowNew(true)} style={{...bPrimary,width:"auto",padding:"9px 18px"}}>+ Add Item</button>
    </div>
    <div style={{display:"grid",gap:10}}>
      {inventory.map(i=>{const low=i.qty<=i.threshold;return <div key={i.id} style={{background:low?"#fff5f5":"#fff",border:"1.5px solid "+(low?"#fecaca":"#ede8e0"),borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:600,fontSize:14}}>{i.name}</div><div style={{fontSize:12,color:"#9b8b77",marginTop:2}}>Min: {i.threshold} {i.unit}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>{low&&<Badge label="Low Stock" color="#dc2626" bg="#fee2e2"/>}<button onClick={()=>updateQty(i.id,-1,i.qty)} style={{background:"#f7f5f2",border:"1.5px solid #ede8e0",color:"#2a2118",width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:16,fontWeight:600}}>-</button><span style={{color:low?"#dc2626":"#2a2118",fontWeight:700,fontSize:15,minWidth:70,textAlign:"center"}}>{i.qty} {i.unit}</span><button onClick={()=>updateQty(i.id,1,i.qty)} style={{background:"#f7f5f2",border:"1.5px solid #ede8e0",color:"#2a2118",width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:16,fontWeight:600}}>+</button></div>
      </div>;})}
      {inventory.length===0&&<div style={{color:"#9b8b77",textAlign:"center",padding:40,background:"#fff",borderRadius:14,border:"1.5px solid #ede8e0"}}>No items yet.</div>}
    </div>
    {showNew&&<Modal title="Add Inventory Item" onClose={()=>setShowNew(false)}>
      {[["Item Name","name","text"],["Quantity","qty","number"],["Low Stock Alert At","threshold","number"]].map(([l,k,t])=><div key={k} style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>{l}</label><input type={t} value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})} style={iStyle}/></div>)}
      <div style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b6b6b",display:"block",marginBottom:5,fontWeight:500}}>Unit</label><select value={f.unit} onChange={e=>setF({...f,unit:e.target.value})} style={iStyle}>{["metres","yards","pcs","rolls","kg","spools"].map(u=><option key={u}>{u}</option>)}</select></div>
      <button onClick={add} disabled={saving} style={bPrimary}>{saving?"Saving...":"Add to Inventory"}</button>
    </Modal>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
